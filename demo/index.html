<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Background remover · app.nz</title>
  <style>
    :root{color-scheme:dark;font:16px/1.5 Inter,system-ui,sans-serif;background:#070707;color:#f5f5f5}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 0,#26372c 0,transparent 38%)}main{width:min(720px,100%);border:1px solid #ffffff1f;border-radius:24px;padding:clamp(24px,6vw,56px);background:#0d0d0de8;box-shadow:0 30px 100px #000}.eyebrow{color:#7ee2a8;text-transform:uppercase;letter-spacing:.16em;font-size:.75rem;font-weight:800}h1{font-size:clamp(2.4rem,8vw,5rem);line-height:.95;margin:.35em 0}p{color:#aaa;max-width:52ch}label{display:block;margin-top:18px;font-size:.82rem;font-weight:700}input,select,button{width:100%;margin-top:7px;padding:14px;border:1px solid #ffffff24;border-radius:12px;background:#050505;color:#fff}button{background:#7ee2a8;color:#07130c;font-weight:900;cursor:pointer}.hint{font-size:.78rem}code{color:#d4ffe4}
  </style>
</head>
<body><main>
  <div class="eyebrow">Open model · local friendly</div>
  <h1>Cut out any background.</h1>
  <p>A tiny frontend for the open-source rembg Cog. Deploy the model, paste its app.nz model id here, and this site lives at its own <code>*.app.nz</code> subdomain.</p>
  <label>Cog model id<input id="model" placeholder="cog model id"></label>
  <label>Image<input id="image" type="file" accept="image/*"></label>
  <label>Segmentation model<select id="kind"><option>isnet-general-use</option><option>u2net</option><option>u2netp</option><option>isnet-anime</option><option>birefnet-general</option></select></label>
  <button id="run">Remove background</button>
  <p id="status" class="hint">Sign in to app.nz in this browser before running.</p>
  <img id="result" alt="Background removal result" style="max-width:100%;margin-top:18px;border-radius:14px">
  <script>
    const $ = (id) => document.getElementById(id);
    $('run').onclick = async () => {
      const file = $('image').files[0];
      const id = $('model').value.trim();
      if (!file || !id) return $('status').textContent = 'Choose an image and enter a model id.';
      $('status').textContent = 'Running…';
      const image = await new Promise((resolve) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.readAsDataURL(file); });
      const response = await fetch(`https://app.nz/api/cogs/${encodeURIComponent(id)}/predict`, { method: 'POST', credentials: 'include', headers: {'content-type':'application/json'}, body: JSON.stringify({input:{image,model:$('kind').value}}) });
      const body = await response.json();
      if (!response.ok) return $('status').textContent = body.error || 'Request failed';
      $('status').textContent = 'Prediction queued. Open Cog Studio to watch it finish.';
      if (typeof body.output === 'string') $('result').src = body.output;
    };
  </script>
</main></body>
</html>
